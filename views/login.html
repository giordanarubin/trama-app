<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Trama</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body class="login-page">
    <header class="login-header">
      <nav>
        <a class="trama-logo" href="/">Trama</a>
      </nav>
    </header>

    <main class="login-container">
      <div class="login-forms-grid">

        <!-- Card de Cadastro -->
        <div class="login-form-card">
          <h2>CADASTRE-SE</h2>
          <form id="registerForm">
            <div class="form-group">
              <input
                type="text"
                id="registerUsername"
                placeholder="Nome de usuário"
                required
                minlength="3"
              />
            </div>
            <div class="form-group">
              <input
                type="email"
                id="registerEmail"
                placeholder="E-mail"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="password"
                id="registerPwd"
                placeholder="Senha (mínimo 6 caracteres)"
                required
                minlength="6"
              />
            </div>
            <button type="submit" class="register-btn">Criar conta</button>
          </form>
        </div>

        <!-- Card de Login -->
        <div class="login-form-card">
          <h2>JÁ TENHO CONTA</h2>
          <form id="loginForm">
            <div class="form-group">
              <input
                type="email"
                placeholder="E-mail"
                id="loginEmail"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="password"
                placeholder="Senha"
                id="loginPwd"
                required
              />
            </div>
            <button type="submit" class="login-btn">Entrar</button>
          </form>
        </div>

      </div>
    </main>

    <footer>
      <p>Trama - Cadernos Digitais • 2025</p>
      <a
        class="footer-note"
        target="_blank"
        href="https://github.com/giordanarubin/trama-app"
        >github.com/giordanarubin/trama-app</a
      >
    </footer>

    <script src="/js/login.js"></script>
  </body>
</html>
